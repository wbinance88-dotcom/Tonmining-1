<!DOCTYPE html>
<html>

<head>
    <title>TON Mining</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div id="pageTitle" style="font-size:22px;font-weight:bold;margin-bottom:20px;">
🏠 Home
    </div>

    <div class="top-card">

        <h1>⛏️ TON Mining</h1>

        <p>Balance</p>
        <div class="balance" id="balance">
            0.0000 TON
        </div>

        <br>

        <p>Next Claim</p>
        <h2 id="timer">Ready</h2>

        <br>

        <button class="mine-btn"
            id="mineBtn"
            onclick="startMining()">

            Claim 0.0009 TON

        </button>

    </div>

</div>

<div class="bottom-nav">

    <button onclick="showPage('home')">
        🏠<br>Home
    </button>

    <button onclick="showPage('referral')">
        👥<br>Referral
    </button>

    <button onclick="showPage('reward')">
        🎁<br>Reward
    </button>

    <button onclick="showPage('task')">
        📋<br>Task
    </button>

    <button onclick="showPage('profile')">
        👤<br>Profile
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
