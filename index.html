<!DOCTYPE html>
<html>

<head>
    <title>TON Mining</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div id="pageTitle" style="font-size:22px;font-weight:bold;margin-bottom:20px;">
        🏠 Home
    </div>

    <div class="top-card">

    <h1>⛏️ TON Mining</h1>

    <div class="coin-box">

        <div class="coin-icon">⛏️</div>

        <div class="coin-reward">
            0.0009 TON
        </div>

    </div>

    

    <p>Next Claim</p>

    <h2 id="timer">Ready</h2>

    <br>

    <button
        class="mine-btn"
        id="mineBtn"
        onclick="startMining()">

        Claim Reward

    </button>

    </div>

</div>

    <!-- Profile Page -->
<div id="profilePage" style="display:none;">

    <h2>👤 User Profile</h2>

    <div class="top-card">

        <p id="username">
    User ID: Guest
</p>

<p>💰 Balance</p>

<div class="balance" id="profileBalance">
    0.0000 TON
</div>

<br>

        <br>

        <button id="walletBtn">
            🔗 Connect Wallet
        </button>

        <br><br>

        <button id="withdrawBtn">
            💸 Withdraw
        </button>

        <div id="withdrawPage" style="display:none;">

    <br>

    <input
        type="text"
        id="walletAddress"
        placeholder="Enter TON Wallet Address">

    <br><br>

    <p>Minimum Withdraw: 0.5 TON</p>

    <button id="submitWithdrawBtn">
        Submit Withdraw
    </button>

        </div>
        
    </div>

</div>
    
<!-- Reward Page -->
    <!-- Referral Page -->
<div id="referralPage" style="display:none;">

    <h2>👥 Referral</h2>

    <div class="top-card">

        <p>Your Referral Link</p>

        <button id="copyReferralBtn">
            🔗 Copy Referral Link
        </button>

        <br><br>

        <p>Total Referrals: 0</p>

        <p>Referral Earnings: 0.0000 TON</p>

    </div>

</div>

<!-- Task Page -->
<div id="taskPage" style="display:none;">

    <h2>📋 Tasks</h2>

    <div class="top-card">

        <button>
            📢 Join Telegram
        </button>

        <br><br>

        <button>
            📺 Watch Ads
        </button>

        <br><br>

        <button>
            🐦 Follow X
        </button>

    </div>

</div>
<div id="rewardPage" style="display:none;">

    <h2>🎁 Daily Reward</h2>

    <div class="top-card">

        <button id="dailyRewardBtn">
            🎁 Claim Daily Reward
        </button>

        <p id="rewardTimer">
            Ready to Claim
        </p>

    </div>

</div>

<div class="bottom-nav">

    <button onclick="showPage('home')">
        🏠<br>Home
    </button>

    <button onclick="showPage('referral')">
        👥<br>Referral
    </button>

    <button onclick="showPage('reward')">
        🎁<br>Reward
    </button>

    <button onclick="showPage('task')">
        📋<br>Task
    </button>

    <button onclick="showPage('profile')">
        👤<br>Profile
    </button>

</div>

    <div id="adModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
">

<button id="closeAdBtn" style="
position:absolute;
top:15px;
right:15px;
font-size:25px;
padding:5px 10px;
">
✕
</button>

<div style="
text-align:center;
margin-top:80px;
color:white;
">

<h2>Advertisement</h2>

<img
id="adImage"
src=""
style="
width:90%;
max-width:350px;
border-radius:10px;
">

<h3 id="adTimer">10</h3>

</div>

    </div>
    
<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
