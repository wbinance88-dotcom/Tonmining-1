<!DOCTYPE html>
<html>

<head>
    <title>TON Mining</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div id="pageTitle" style="font-size:22px;font-weight:bold;margin-bottom:20px;">
        🏠 Home
    </div>

    <div class="top-card">

    <h1>⛏️ TON Mining</h1>

    <div class="coin-box">

        <div class="coin-icon">⛏️</div>

        <div class="coin-reward">
            0.0009 TON
        </div>

    </div>

    

    <p>Next Claim</p>

    <h2 id="timer">Ready</h2>

    <br>

    <button
        class="mine-btn"
        id="mineBtn"
        onclick="startMining()">

        Claim Reward

    </button>

    </div>

</div>

    <!-- Profile Page -->
<div id="profilePage" style="display:none;">

    <h2>👤 User Profile</h2>

    <div class="top-card">

        <p id="username">
            User ID: Guest
            <p>💰 Balance</p>

<div class="balance" id="profileBalance">
    0.0000 TON
</div>

<br>
        </p>

        <br>

        <button id="walletBtn">
            🔗 Connect Wallet
        </button>

        <br><br>

        <button id="withdrawBtn">
            💸 Withdraw
        </button>

    </div>

</div>
    
<!-- Reward Page -->
    <!-- Referral Page -->
<div id="referralPage" style="display:none;">

    <h2>👥 Referral</h2>

    <div class="top-card">

        <p>Your Referral Link</p>

        <button id="copyReferralBtn">
            🔗 Copy Referral Link
        </button>

        <br><br>

        <p>Total Referrals: 0</p>

        <p>Referral Earnings: 0.0000 TON</p>

    </div>

</div>

<!-- Task Page -->
<div id="taskPage" style="display:none;">

    <h2>📋 Tasks</h2>

    <div class="top-card">

        <button>
            📢 Join Telegram
        </button>

        <br><br>

        <button>
            📺 Watch Ads
        </button>

        <br><br>

        <button>
            🐦 Follow X
        </button>

    </div>

</div>
<div id="rewardPage" style="display:none;">

    <h2>🎁 Daily Reward</h2>

    <div class="top-card">

        <button id="dailyRewardBtn">
            🎁 Claim Daily Reward
        </button>

    </div>

</div>

<div class="bottom-nav">

    <button onclick="showPage('home')">
        🏠<br>Home
    </button>

    <button onclick="showPage('referral')">
        👥<br>Referral
    </button>

    <button onclick="showPage('reward')">
        🎁<br>Reward
    </button>

    <button onclick="showPage('task')">
        📋<br>Task
    </button>

    <button onclick="showPage('profile')">
        👤<br>Profile
    </button>

</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
